<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Atenciones</title>
</head>
<body>

<h2>Registrar Atención</h2>
<button onclick="window.location.href='dashboard.html'">← Volver</button>

<br><br>

<label>Curso:</label>
<select id="select-curso" onchange="cargarEstudiantes()">
  <option value="">-- Selecciona un curso --</option>
</select>

<label>Estudiante:</label>
<select id="select-estudiante">
  <option value="">-- Selecciona un estudiante --</option>
</select>

<br><br>

<label>Fecha: *</label>
<input type="date" id="fecha">

<label>Hora:</label>
<input type="time" id="hora">

<label>Síntomas:</label>
<input type="text" id="sintomas" placeholder="Síntomas presentados">

<label>Diagnóstico:</label>
<input type="text" id="diagnostico" placeholder="Diagnóstico realizado">

<label>Acción tomada:</label>
<input type="text" id="accion" placeholder="Acción realizada">

<br><br>
<button onclick="registrar()">Guardar atención</button>
<p id="msg"></p>

<hr>

<h3>Atenciones registradas</h3>
<table border="1">
  <thead>
    <tr>
      <th>#</th>
      <th>Estudiante</th>
      <th>Curso</th>
      <th>Fecha</th>
      <th>Hora</th>
      <th>Síntomas</th>
      <th>Diagnóstico</th>
      <th>Acción</th>
      <th>Eliminar</th>
    </tr>
  </thead>
  <tbody id="tabla-atenciones"></tbody>
</table>

<script src="app.js"></script>
<script>

async function cargarCursos() {
  const res  = await fetch(API + "/cursos");
  const data = await res.json();
  const sel  = document.getElementById("select-curso");
  data.forEach(c => {
    sel.innerHTML += `<option value="${c.id_curso}">${c.nombre} (${c.anio})</option>`;
  });
}

async function cargarEstudiantes() {
  const id_curso = document.getElementById("select-curso").value;
  const sel = document.getElementById("select-estudiante");
  sel.innerHTML = "<option value=''>-- Selecciona un estudiante --</option>";
  if (!id_curso) return;

  const res  = await fetch(API + "/estudiantes?id_curso=" + id_curso);
  const data = await res.json();
  data.forEach(e => {
    sel.innerHTML += `<option value="${e.id_estudiante}">${e.nombre} ${e.apellido || ""}</option>`;
  });
}

async function cargarAtenciones() {
  const res  = await fetch(API + "/atenciones");
  const data = await res.json();
  const tbody = document.getElementById("tabla-atenciones");
  tbody.innerHTML = "";
  if (data.length === 0) {
    tbody.innerHTML = '<tr><td colspan="9">Sin atenciones registradas.</td></tr>';
    return;
  }
  data.forEach((a, i) => {
    tbody.innerHTML += `
      <tr>
        <td>${i + 1}</td>
        <td>${a.nombre_estudiante}</td>
        <td>${a.nombre_curso || "—"}</td>
        <td>${a.fecha || "—"}</td>
        <td>${a.hora || "—"}</td>
        <td>${a.sintomas || "—"}</td>
        <td>${a.diagnostico || "—"}</td>
        <td>${a.accion || "—"}</td>
        <td><button onclick="eliminar(${a.id_atencion})">Eliminar</button></td>
      </tr>`;
  });
}

async function registrar() {
  const msg = document.getElementById("msg");
  const id_estudiante = document.getElementById("select-estudiante").value;
  const fecha         = document.getElementById("fecha").value;
  const hora          = document.getElementById("hora").value;
  const sintomas      = document.getElementById("sintomas").value;
  const diagnostico   = document.getElementById("diagnostico").value;
  const accion        = document.getElementById("accion").value;

  if (!id_estudiante || !fecha) {
    msg.textContent = "Selecciona un estudiante y una fecha.";
    return;
  }

  const res = await fetch(API + "/atenciones", {
    method:  "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ id_estudiante, fecha, hora, sintomas, diagnostico, accion })
  });

  const data = await res.json();
  msg.textContent = res.ok ? "✅ " + data.mensaje : "❌ " + data.mensaje;

  if (res.ok) {
    document.getElementById("fecha").value      = "";
    document.getElementById("hora").value       = "";
    document.getElementById("sintomas").value   = "";
    document.getElementById("diagnostico").value = "";
    document.getElementById("accion").value     = "";
    cargarAtenciones();
  }
}

async function eliminar(id) {
  if (!confirm("¿Eliminar esta atención?")) return;
  await fetch(API + "/atenciones/" + id, { method: "DELETE" });
  cargarAtenciones();
}

cargarCursos();
cargarAtenciones();

</script>
</body>
</html>
