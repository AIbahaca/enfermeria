<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Medicamentos</title>
</head>
<body>

<h2>Medicamentos</h2>
<button onclick="window.location.href='dashboard.html'">← Volver</button>

<br><br>

<label>Nombre: *</label>
<input type="text" id="nombre" placeholder="Nombre del medicamento">

<label>Uso:</label>
<input type="text" id="uso" placeholder="Para qué se usa">

<label>Tipo:</label>
<input type="text" id="tipo" placeholder="Tipo de medicamento">

<label>Stock:</label>
<input type="number" id="stock" placeholder="Cantidad disponible" min="0">

<button onclick="crear()">Agregar</button>
<p id="msg"></p>

<hr>

<table border="1">
  <thead>
    <tr>
      <th>#</th>
      <th>Nombre</th>
      <th>Uso</th>
      <th>Tipo</th>
      <th>Stock</th>
      <th>Eliminar</th>
    </tr>
  </thead>
  <tbody id="tabla-medicamentos"></tbody>
</table>

<script src="app.js"></script>
<script>

async function cargar() {
  const res  = await fetch(API + "/medicamentos");
  const data = await res.json();
  const tbody = document.getElementById("tabla-medicamentos");
  tbody.innerHTML = "";

  if (data.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6">Sin medicamentos registrados.</td></tr>';
    return;
  }

  data.forEach((m, i) => {
    tbody.innerHTML += `
      <tr>
        <td>${i + 1}</td>
        <td>${m.nombre}</td>
        <td>${m.uso || "—"}</td>
        <td>${m.tipo || "—"}</td>
        <td>${m.stock ?? "—"}</td>
        <td><button onclick="eliminar(${m.id_medicamento})">Eliminar</button></td>
      </tr>`;
  });
}

async function crear() {
  const msg   = document.getElementById("msg");
  const nombre = document.getElementById("nombre").value.trim();
  const uso    = document.getElementById("uso").value.trim();
  const tipo   = document.getElementById("tipo").value.trim();
  const stock  = document.getElementById("stock").value;

  if (!nombre) { msg.textContent = "El nombre es obligatorio."; return; }

  const res = await fetch(API + "/medicamentos", {
    method:  "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ nombre, uso, tipo, stock: stock ? parseInt(stock) : null })
  });

  const data = await res.json();
  msg.textContent = res.ok ? "✅ " + data.mensaje : "❌ " + data.mensaje;

  if (res.ok) {
    document.getElementById("nombre").value = "";
    document.getElementById("uso").value    = "";
    document.getElementById("tipo").value   = "";
    document.getElementById("stock").value  = "";
    cargar();
  }
}

async function eliminar(id) {
  if (!confirm("¿Eliminar este medicamento?")) return;
  await fetch(API + "/medicamentos/" + id, { method: "DELETE" });
  cargar();
}

cargar();

</script>
</body>
</html>
